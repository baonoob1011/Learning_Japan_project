name: Build and Deploy Docker Image

on:
  push:
    branches:
      - main
      - dev
      - deploy
    paths:
      - 'learningApp/**'
      - 'tool/**'
      - '.github/workflows/**'
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./learningApp
          file: ./learningApp/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/learning-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/learning-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/deploy'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "./learningApp/docker-compose.yml"
          target: "~/app"
          strip_components: 1

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            export APP_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/learning-app:${{ github.sha }}
            docker-compose pull
            docker-compose up -d --force-recreate
            docker image prune -f