name: Build and Deploy Docker Image

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'learningApp/**'
      - 'tool/**'
      - '.github/workflows/**'
      - '*'
  workflow_dispatch: # Cho phép chạy thủ công bằng nút bấm trên GitHub

permissions:
  contents: write

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./learningApp
          file: ./learningApp/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/learning-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/app
            cd ~/app
            # Tạo file docker-compose.yml từ repo (có thể copy từ repo sang)
            # Hoặc pull repo về EC2 nếu bạn muốn setup gọn.
            # Ở đây ta giả sử đã có file docker-compose.yml và .env trên EC2.
            docker-compose pull
            docker-compose up -d
            docker image prune -f
