name: Build and Deploy Docker Image

on:
  push:
    branches:
      - main 
      - dev
    paths:
      - 'learningApp/**' # Chỉ trigger khi code của BE thay đổi

permissions:
  contents: write

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Bỏ comment và nhập Docker Hub username/password vào Settings > Secrets của GitHub
      # NẾU BẠN MUỐN ĐẨY IMAGE LÊN DOCKER HUB:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./learningApp
          file: ./learningApp/Dockerfile
          push: true
          # Thay `your-dockerhub-username` bằng username Docker Hub thực tế của bạn
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/learning-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
