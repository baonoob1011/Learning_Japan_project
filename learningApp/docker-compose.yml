version: "3.9"

services:

  ##################################################
  # 🦓 Zookeeper
  ##################################################
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  ##################################################
  # 🦜 Kafka
  ##################################################
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  ##################################################
  # 🧠 Redis (for bitmap, cache, etc.)
  ##################################################
  redis:
    image: redis:7.0
    container_name: redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

  ##################################################
  # 📊 Redis Exporter (Prometheus metrics)
  ##################################################
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  ##################################################
  # ⚙️ Kafka Exporter (Prometheus metrics)
  ##################################################
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    environment:
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_VERSION: 2.6.0
    ports:
      - "9308:9308"
    depends_on:
      - kafka
    restart: unless-stopped

  ##################################################
  # 📈 Node Exporter (System metrics)
  ##################################################
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    restart: unless-stopped

  ##################################################
  # 🚨 Alertmanager
  ##################################################
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    restart: unless-stopped

  ##################################################
  # 📦 Prometheus
  ##################################################
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    depends_on:
      - alertmanager
      - node-exporter
      - kafka
      - redis-exporter
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./rules.yml:/etc/prometheus/rules.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  ##################################################
  # 📊 Grafana Dashboard
  ##################################################
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    depends_on:
      - prometheus
    ports:
      - "4000:3000"   # <--- đổi 3000 bên trái thành port bạn muốn
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped

  ##################################################
  # 🔎 Elasticsearch (for ELK)
  ##################################################
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    restart: unless-stopped

  ##################################################
  # 🐘 PostgreSQL
  ##################################################
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: learningApp
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped


##################################################
# 📦 Shared Volumes
##################################################
volumes:
  redis_data:
  esdata:
  postgres_data:
