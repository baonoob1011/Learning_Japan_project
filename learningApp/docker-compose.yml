version: "3.9"

services:

  ##################################################
  # 🐘 PostgreSQL
  ##################################################
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    command: ["postgres", "-p", "5433"]
    environment:
      POSTGRES_DB: learningApp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d learningApp -p 5433"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped


  ##################################################
  # 🦓 Zookeeper
  ##################################################
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped

  ##################################################
  # 🦜 Kafka
  ##################################################
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092" # External (host machine)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Dual listener: INTERNAL cho Docker, EXTERNAL cho host machine
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

  ##################################################
  # 🧠 Redis (for bitmap, cache, etc.)
  ##################################################
  redis:
    image: redis:7.0
    container_name: redis
    ports:
      - "6379:6379"
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  ##################################################
  # 🚀 Backend Application (Learning App)
  ##################################################
  learning-app:
    image: baonoob1011/learning-app:latest
    container_name: learning-app
    ports:
      - "8080:8080"
    env_file:
      - .env # Nếu dự án bạn đang dùng file .env
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      # Support both old and new Spring Redis property names at runtime.
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Force Spring datasource at runtime (works even if image has old application.yaml)
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5433/learningApp
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - DB_URL=jdbc:postgresql://postgres:5433/learningApp
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

##################################################
# 📦 Shared Volumes
##################################################
volumes:
  redis_data:
  esdata:
  postgres_data:
